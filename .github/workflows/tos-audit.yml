name: ToS audit (weekly)

# AVA Phase 0.4b — fetch the 8 platform ToS pages every Monday 16:00 UTC,
# diff against last cached version, fail + alert if any page changed >5%.

on:
  schedule:
    - cron: '0 16 * * 1'  # Mondays 16:00 UTC = 9 AM PT
  workflow_dispatch: {}   # manual trigger via GitHub UI

permissions:
  contents: write   # to commit updated .tos-cache/

concurrency:
  group: tos-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run ToS audit
        id: audit
        run: |
          set +e
          node scripts/tos-audit.mjs
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Upload audit summary
        uses: actions/upload-artifact@v4
        with:
          name: tos-audit-${{ github.run_id }}
          path: .tos-cache/changes.json
          if-no-files-found: error

      - name: Commit cache updates
        # Always commit so each run's "last good" cache is the comparison baseline.
        run: |
          git config user.name  "ava-tos-audit-bot"
          git config user.email "ava-tos-audit-bot@users.noreply.github.com"
          git add .tos-cache/
          if ! git diff --cached --quiet; then
            git commit -m "chore(tos-audit): refresh cache $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No cache changes to commit."
          fi

      - name: Post alert on change
        if: steps.audit.outputs.exit_code == '1'
        run: |
          echo "::warning::AVA ToS audit detected material change. Inspect .tos-cache/changes.json."
          # Wire one of these alert paths when ready:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data "{\"text\":\"AVA ToS audit alert — see run $GITHUB_RUN_ID\"}" \
          #   "$SLACK_WEBHOOK_URL"
          # gh issue create --title "ToS change detected" --body "See workflow run."
          exit 1   # surface red CI status to remind the human

      - name: Post failure on fetch error
        if: steps.audit.outputs.exit_code == '2'
        run: |
          echo "::error::tos-audit.mjs threw a fatal error."
          exit 1
